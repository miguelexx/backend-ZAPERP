<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Permissões — Administração</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #07080d;
      --bg-mid: #0e1018;
      --surface: rgba(18, 22, 34, 0.72);
      --surface-hover: rgba(28, 34, 52, 0.85);
      --border: rgba(94, 234, 212, 0.12);
      --border-glow: rgba(56, 189, 248, 0.35);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #22d3ee;
      --accent-dim: rgba(34, 211, 238, 0.15);
      --accent-strong: #06b6d4;
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.12);
      --danger: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.12);
      --neutral: #64748b;
      --neutral-bg: rgba(100, 116, 139, 0.18);
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.55);
      --font: 'Outfit', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg-deep);
      line-height: 1.55;
      overflow-x: hidden;
    }

    /* Ambient grid + vignette */
    .bg-scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% -30%, rgba(34, 211, 238, 0.14), transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 50%, rgba(99, 102, 241, 0.08), transparent 50%),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(6, 182, 212, 0.06), transparent 45%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 45%, #05060a 100%);
    }
    .bg-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 35%, black 15%, transparent 70%);
    }

    .layout {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .hero {
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .hero-kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px var(--accent-strong);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(0.92); }
    }
    .hero h1 {
      font-size: clamp(1.65rem, 4vw, 2rem);
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 52ch;
    }

    .alert {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 18px;
      font-size: 0.9rem;
      border: 1px solid transparent;
      backdrop-filter: blur(8px);
    }
    .alert.error {
      background: var(--danger-bg);
      border-color: rgba(248, 113, 113, 0.35);
      color: #fecaca;
    }
    .alert.success {
      background: rgba(52, 211, 153, 0.1);
      border-color: rgba(52, 211, 153, 0.35);
      color: #a7f3d0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 22px 20px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .panel:hover {
      border-color: rgba(94, 234, 212, 0.22);
      box-shadow: var(--shadow), 0 0 0 1px rgba(34, 211, 238, 0.06);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      justify-content: space-between;
    }
    .field { flex: 1; min-width: 220px; }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(10, 12, 18, 0.85);
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus {
      border-color: var(--border-glow);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    select option { background: #111827; color: var(--text); }

    .actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      padding: 11px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-strong) 0%, #0891b2 100%);
      color: #042f2e;
      box-shadow: 0 4px 20px rgba(6, 182, 212, 0.35);
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(34, 211, 238, 0.45);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      color: var(--text);
      border-color: rgba(148, 163, 184, 0.35);
      background: rgba(255, 255, 255, 0.03);
    }

    .user-chip {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.06) 0%, rgba(99, 102, 241, 0.04) 100%);
      border: 1px solid rgba(94, 234, 212, 0.1);
      font-size: 0.88rem;
      color: var(--text-muted);
      display: none;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
    }
    .user-chip strong {
      color: var(--text);
      font-weight: 600;
    }
    .user-chip span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .user-chip span::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.8;
    }

    #permissoes-root { min-height: 120px; }

    .cat-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 4px 12px;
      margin-bottom: 18px;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .cat-head {
      padding: 16px 18px 12px;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cat-head::before {
      content: '';
      width: 3px;
      height: 18px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--accent) 0%, #6366f1 100%);
    }

    .perm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      margin: 0 8px 8px;
      border-radius: var(--radius-sm);
      background: rgba(8, 10, 16, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.06);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .perm-row:hover {
      background: var(--surface-hover);
      border-color: rgba(94, 234, 212, 0.12);
    }

    .permissao-nome {
      font-weight: 600;
      font-size: 0.93rem;
      color: #f1f5f9;
    }
    .permissao-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.45;
      max-width: 42rem;
    }

    .badge-override {
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.12) 100%);
      color: #fcd34d;
      border: 1px solid rgba(251, 191, 36, 0.25);
      vertical-align: middle;
    }

    .perm-toggle {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      padding: 4px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    .perm-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 9px;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .perm-btn:hover:not(:disabled) {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .perm-btn.allow.active {
      background: var(--success-bg);
      color: var(--success);
      box-shadow: 0 0 16px rgba(52, 211, 153, 0.15);
    }
    .perm-btn.deny.active {
      background: var(--danger-bg);
      color: var(--danger);
      box-shadow: 0 0 16px rgba(248, 113, 113, 0.12);
    }
    .perm-btn.default.active {
      background: var(--neutral-bg);
      color: #cbd5e1;
    }

    .loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 0.92rem;
    }
    .loading::after {
      content: '';
      display: block;
      width: 32px;
      height: 32px;
      margin: 16px auto 0;
      border: 2px solid rgba(34, 211, 238, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .actions { width: 100%; }
      .actions .btn { flex: 1; }
      .perm-row {
        flex-direction: column;
        align-items: stretch;
      }
      .perm-toggle { justify-content: stretch; }
      .perm-btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="bg-scene" aria-hidden="true"></div>

  <div class="layout">
    <header class="hero">
      <div class="hero-kicker">Central de controle</div>
      <h1>Matriz de permissões</h1>
      <p class="subtitle">
        Defina o que cada usuário pode fazer na plataforma. Conceda, negue ou restaure ao padrão do perfil — alterações aplicadas em tempo real após salvar.
      </p>
    </header>

    <div id="error" class="alert error" style="display:none;"></div>
    <div id="success" class="alert success" style="display:none;"></div>

    <section class="panel">
      <div class="toolbar">
        <div class="field">
          <label for="usuario">Usuário</label>
          <select id="usuario" disabled>
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-ghost" id="restaurar" disabled>Restaurar padrão</button>
          <button type="button" class="btn btn-primary" id="salvar" disabled>Salvar alterações</button>
        </div>
      </div>
      <div id="user-info" class="user-chip"></div>
    </section>

    <div id="permissoes-root">
      <div class="loading" id="loading">Carregando permissões</div>
    </div>
  </div>

  <script>
    (function() {
      const API = window.location.pathname.startsWith('/api') ? '' : (document.querySelector('base')?.href || '');
      const getToken = () => localStorage.getItem('token') || localStorage.getItem('authToken') || localStorage.getItem('jwt') || '';
      const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken(), credentials: 'include' });

      const $ = id => document.getElementById(id);
      const show = (el, msg) => {
        el.style.display = 'block';
        if (msg !== undefined) el.textContent = msg;
      };
      const hide = (el) => el.style.display = 'none';

      let catalogo = [];
      let usuarios = [];
      let permissoesAtuais = [];
      let usuarioSelecionado = null;
      let overrides = {};

      async function fetchApi(path, opts = {}) {
        const base = window.location.pathname.startsWith('/api') ? '' : '/api';
        const res = await fetch((base + path), { ...opts, credentials: 'include', headers: { ...headers(), ...(opts.headers || {}) } });
        if (res.status === 401) { window.location.href = '/login'; return null; }
        if (res.status === 403) throw new Error('Acesso restrito a administradores');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Erro na requisição');
        return data;
      }

      async function loadUsuarios() {
        const data = await fetchApi('/usuarios');
        if (!data) return;
        usuarios = Array.isArray(data) ? data : [];
        const sel = $('usuario');
        sel.innerHTML = '<option value="">Selecione um usuário</option>' +
          usuarios.map(u => `<option value="${u.id}">${escapeHtml(u.nome)} (${u.perfil || 'atendente'})</option>`).join('');
        sel.disabled = false;
      }

      async function loadCatalogo() {
        const data = await fetchApi('/config/permissoes/catalogo');
        if (!data) return;
        catalogo = data.catalogo || [];
      }

      async function loadPermissoesUsuario(id) {
        const data = await fetchApi('/usuarios/' + id + '/permissoes');
        if (!data) return;
        usuarioSelecionado = data.usuario;
        permissoesAtuais = data.permissoes || [];
        overrides = {};
        permissoesAtuais.filter(p => p.isOverride).forEach(p => {
          overrides[p.codigo] = p.concedido;
        });
        $('restaurar').disabled = !permissoesAtuais.some(p => p.isOverride);
        renderUserInfo();
        renderPermissoes();
      }

      function escapeHtml(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function renderUserInfo() {
        const ui = $('user-info');
        if (!usuarioSelecionado) { ui.style.display = 'none'; return; }
        const u = usuarioSelecionado;
        const dep = usuarios.find(x => x.id === u.id)?.departamentos?.nome || '';
        ui.innerHTML = `<span><strong>${escapeHtml(u.nome)}</strong></span>` +
          `<span>${escapeHtml(u.email)}</span>` +
          `<span>Perfil ${escapeHtml(u.perfil || 'atendente')}</span>` +
          (dep ? `<span>Setor ${escapeHtml(dep)}</span>` : '');
        ui.style.display = 'flex';
      }

      function renderPermissoes() {
        const root = $('permissoes-root');
        root.innerHTML = '';
        hide($('loading'));

        catalogo.forEach(cat => {
          const wrap = document.createElement('div');
          wrap.className = 'cat-panel';
          const head = document.createElement('div');
          head.className = 'cat-head';
          head.textContent = cat.categoria;
          wrap.appendChild(head);

          (cat.permissoes || []).forEach(perm => {
            const p = permissoesAtuais.find(x => x.codigo === perm.codigo) || perm;
            const estado = overrides[perm.codigo] !== undefined ? overrides[perm.codigo] : null;
            const div = document.createElement('div');
            div.className = 'perm-row';
            div.innerHTML = `
              <div>
                <div class="permissao-nome">${escapeHtml(perm.nome)}${p.isOverride ? ' <span class="badge-override">Personalizado</span>' : ''}</div>
                ${perm.descricao ? `<div class="permissao-desc">${escapeHtml(perm.descricao)}</div>` : ''}
              </div>
              <div class="perm-toggle">
                <button type="button" class="perm-btn allow ${estado === true ? 'active' : ''}" data-codigo="${escapeHtml(perm.codigo)}" data-val="true">Permitir</button>
                <button type="button" class="perm-btn deny ${estado === false ? 'active' : ''}" data-codigo="${escapeHtml(perm.codigo)}" data-val="false">Negar</button>
                <button type="button" class="perm-btn default ${estado === null ? 'active' : ''}" data-codigo="${escapeHtml(perm.codigo)}" data-val="null">Padrão</button>
              </div>
            `;
            wrap.appendChild(div);
          });
          root.appendChild(wrap);
        });

        root.querySelectorAll('.perm-btn').forEach(btn => {
          btn.onclick = () => {
            const codigo = btn.dataset.codigo;
            const val = btn.dataset.val === 'null' ? null : btn.dataset.val === 'true';
            overrides[codigo] = val;
            const row = btn.closest('.perm-row');
            row.querySelectorAll('.perm-btn').forEach(b => b.classList.remove('active'));
            row.querySelectorAll(`[data-codigo="${codigo}"]`).forEach(b => {
              if ((val === null && b.dataset.val === 'null') || (val === true && b.dataset.val === 'true') || (val === false && b.dataset.val === 'false')) b.classList.add('active');
            });
            const badge = row.querySelector('.badge-override');
            if (val !== null) {
              if (!badge) { const d = row.querySelector('.permissao-nome'); d.innerHTML += ' <span class="badge-override">Personalizado</span>'; }
            } else if (badge) badge.remove();
            $('salvar').disabled = false;
          };
        });
      }

      async function salvar() {
        const id = $('usuario').value;
        if (!id) return;
        $('salvar').disabled = true;
        hide($('error'));
        hide($('success'));
        try {
          const payload = {};
          Object.entries(overrides).forEach(([codigo, val]) => {
            if (val !== undefined) payload[codigo] = val;
          });
          await fetchApi('/usuarios/' + id + '/permissoes', {
            method: 'PUT',
            body: JSON.stringify({ permissoes: payload })
          });
          show($('success'), 'Permissões salvas com sucesso.');
          setTimeout(() => hide($('success')), 3000);
          loadPermissoesUsuario(id);
        } catch (e) {
          show($('error'), e.message);
          $('salvar').disabled = false;
        }
      }

      async function restaurar() {
        const id = $('usuario').value;
        if (!id) return;
        if (!confirm('Remover todas as permissões personalizadas e usar o padrão do perfil?')) return;
        $('restaurar').disabled = true;
        hide($('error'));
        hide($('success'));
        try {
          const payload = {};
          permissoesAtuais.filter(p => p.isOverride).forEach(p => { payload[p.codigo] = null; });
          await fetchApi('/usuarios/' + id + '/permissoes', {
            method: 'PUT',
            body: JSON.stringify({ permissoes: payload })
          });
          show($('success'), 'Padrão restaurado com sucesso.');
          setTimeout(() => hide($('success')), 3000);
          loadPermissoesUsuario(id);
          $('restaurar').disabled = false;
        } catch (e) {
          show($('error'), e.message);
          $('restaurar').disabled = false;
        }
      }

      $('usuario').onchange = () => {
        const id = $('usuario').value;
        if (!id) {
          $('restaurar').disabled = true;
          $('salvar').disabled = true;
          $('user-info').style.display = 'none';
          $('permissoes-root').innerHTML = '';
          return;
        }
        $('restaurar').disabled = true;
        $('salvar').disabled = true;
        $('permissoes-root').innerHTML = '<div class="loading" id="loading">Carregando</div>';
        loadPermissoesUsuario(id);
      };

      $('salvar').onclick = salvar;
      $('restaurar').onclick = restaurar;

      (async function init() {
        if (!getToken()) { window.location.href = '/login'; return; }
        try {
          await Promise.all([loadUsuarios(), loadCatalogo()]);
          if (!$('usuario').value && $('permissoes-root').querySelector('.loading')) {
            $('permissoes-root').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2.5rem 1rem;font-size:0.95rem;">Selecione um usuário acima para visualizar e editar as permissões.</p>';
          }
        } catch (e) {
          show($('error'), e.message);
        }
      })();
    })();
  </script>
</body>
</html>
